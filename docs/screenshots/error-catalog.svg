<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Error Catalog</title>
  <desc id="desc">Error catalog preview with search, similar error suggestions and cause solution blocks.</desc>
  <rect width="1280" height="760" fill="#f6f8fb"/>
  <rect x="48" y="40" width="1184" height="110" rx="10" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="82" y="94" fill="#0f172a" font-family="Arial" font-size="30" font-weight="700">Fehlerkatalog</text>
  <text x="82" y="122" fill="#64748b" font-family="Arial" font-size="15">Suchen, vergleichen und Loesungen schneller finden</text>
  <rect x="48" y="180" width="1184" height="72" rx="10" fill="#ffffff" stroke="#dbe3ef"/>
  <rect x="80" y="198" width="420" height="38" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="104" y="222" fill="#64748b" font-family="Arial" font-size="14">Temperatur CNC</text>
  <rect x="524" y="198" width="118" height="38" rx="6" fill="#2563eb"/>
  <text x="555" y="222" fill="#ffffff" font-family="Arial" font-size="14" font-weight="700">Suchen</text>
  <rect x="48" y="284" width="1184" height="330" rx="10" fill="#ffffff" stroke="#dbe3ef"/>
  <g font-family="Arial">
    <text x="82" y="332" fill="#0f172a" font-size="21" font-weight="700">Eintraege</text>
    <rect x="82" y="362" width="1040" height="86" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
    <rect x="104" y="390" width="84" height="24" rx="12" fill="#e0f2fe"/>
