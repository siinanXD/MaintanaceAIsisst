name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    env:
      FLASK_ENV: testing
      FLASK_DEBUG: "0"
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key
      DATABASE_URL: sqlite:///:memory:
      AI_PROVIDER: mock
      OPENAI_API_KEY: ""
      OPENAI_MODEL: test-model
      UPLOAD_FOLDER: /tmp/maintenance-uploads
      DOCUMENTS_FOLDER: /tmp/maintenance-documents
      LOG_DIR: /tmp/maintenance-logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check .

      - name: Compile Python files
        run: python -m compileall app seed_demo.py seed.py run.py

      - name: App startup check
        run: |
          python - <<'PY'
          from app import create_app

          app = create_app()
          client = app.test_client()
          response = client.get("/health")

          assert response.status_code == 200
          assert response.get_json() == {"status": "ok"}
          PY

      - name: Run tests
        run: python -m pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag maintenance-assistant:ci .
