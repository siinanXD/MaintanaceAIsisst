services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      DATABASE_URL: sqlite:////app/data/maintenance.db
      UPLOAD_FOLDER: /app/data/uploads
      DOCUMENTS_FOLDER: /app/documents
      LOG_DIR: /app/logs
    ports:
      - "5050:5050"
    volumes:
      - maintenance_data:/app/data
      - maintenance_documents:/app/documents
      - maintenance_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  maintenance_data:
  maintenance_documents:
  maintenance_logs:
